version: "3.9"

services:
  api:
    build: .
    container_name: job-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
      - POSTGRES_DB=jobs_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - JWT_SECRET_KEY=super-secret-dev-key
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - RATE_LIMIT_JOBS_PER_MINUTE=10
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build: .
    container_name: job-worker
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
      - POSTGRES_DB=jobs_db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - db
      - redis

  flower:
    build: .
    container_name: job-flower
    command: celery -A app.celery_app.celery_app flower --port=5555
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    depends_on:
      - redis
    ports:
      - "5555:5555"

  redis:
    image: redis:7-alpine
    container_name: job-redis
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    container_name: job-db
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppassword
      - POSTGRES_DB=jobs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

